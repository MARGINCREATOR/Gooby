<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="author" content="Richard B. Price Jr.">
<title>Gooby</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
font-family:-apple-system,BlinkMacSystemFont,‘Helvetica Neue’,sans-serif;
background-color:#06080f;
color:#fff;
min-height:100vh;min-height:100dvh;
overflow-x:hidden;
-webkit-font-smoothing:antialiased;
}

/* LIVING BACKGROUND */
canvas#sky{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

.aurora{
position:fixed;top:0;left:0;right:0;bottom:0;z-index:0;pointer-events:none;
overflow:hidden;
}
.aurora-band{
position:absolute;width:200%;height:40%;
border-radius:50%;filter:blur(80px);opacity:0.12;
animation:auroraShift 12s ease-in-out infinite alternate;
}
.ab1{background-color:#2B4C7E;top:-10%;left:-30%;animation-duration:14s}
.ab2{background-color:#D4A843;bottom:5%;right:-40%;animation-duration:10s;animation-delay:-4s;opacity:0.07}
.ab3{background-color:#1A5276;top:30%;left:-20%;animation-duration:16s;animation-delay:-7s;opacity:0.09}
@keyframes auroraShift{
0%{transform:translateX(0) rotate(0deg) scale(1)}
100%{transform:translateX(60px) rotate(8deg) scale(1.15)}
}

/* =================== SPLASH =================== */
#splash{
position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;
display:flex;flex-direction:column;align-items:center;justify-content:center;
background-color:#06080f;overflow:hidden;
}
#splash.hidden{display:none}

.sp-ring{
position:absolute;width:280px;height:280px;
border:2px solid rgba(212,168,67,0.08);
border-radius:50%;
animation:ringPulse 4s ease-in-out infinite;
}
.sp-ring:nth-child(2){width:360px;height:360px;animation-delay:-1.3s;border-color:rgba(43,76,126,0.06)}
.sp-ring:nth-child(3){width:440px;height:440px;animation-delay:-2.6s;border-color:rgba(212,168,67,0.04)}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.08);opacity:0.4}}

.sp-z{position:relative;z-index:2;text-align:center}

.sp-paw{
font-size:92px;
animation:pawDance 2.5s cubic-bezier(0.36,0.07,0.19,0.97) infinite;
filter:drop-shadow(0 0 30px rgba(212,168,67,0.25));
}
@keyframes pawDance{
0%,100%{transform:translateY(0) rotate(-10deg) scale(1)}
25%{transform:translateY(-30px) rotate(8deg) scale(1.08)}
50%{transform:translateY(-5px) rotate(-5deg) scale(0.96)}
75%{transform:translateY(-18px) rotate(4deg) scale(1.03)}
}

.sp-title{
font-size:60px;font-weight:900;
color:#D4A843;
margin:16px 0 0;letter-spacing:6px;
text-shadow:0 0 40px rgba(212,168,67,0.3),0 0 80px rgba(212,168,67,0.1);
}
.sp-line{
width:60px;height:3px;border-radius:2px;
background-color:#D4A843;
margin:10px auto 6px;opacity:0.4;
}
.sp-sub{
font-size:12px;font-weight:700;
color:#3a4060;letter-spacing:4px;
text-transform:uppercase;margin-bottom:44px;
}

.gbtn{
font-size:20px;font-weight:900;
padding:18px 58px;border:none;border-radius:50px;
background-color:#D4A843;color:#06080f;
cursor:pointer;
-webkit-appearance:none;appearance:none;
box-shadow:0 0 40px rgba(212,168,67,0.2),0 6px 24px rgba(0,0,0,0.4);
position:relative;overflow:hidden;
letter-spacing:1px;
}
.gbtn::after{
content:’’;position:absolute;top:0;left:-100%;width:70%;height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
animation:gshine 3.5s ease-in-out infinite;
}
@keyframes gshine{0%,100%{left:-100%}50%{left:130%}}
.gbtn:active{transform:scale(0.96);box-shadow:0 0 20px rgba(212,168,67,0.15)}

/* =================== GAME =================== */
#game{display:none;flex-direction:column;min-height:100vh;min-height:100dvh;padding:10px 12px 20px;position:relative;z-index:1}
#game.active{display:flex}

/* TOP BAR */
.hud{
display:flex;justify-content:space-between;align-items:center;
padding:10px 16px;
background-color:rgba(14,18,36,0.75);
border-radius:16px;margin-bottom:8px;
border:1px solid rgba(255,255,255,0.04);
-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);
}
.hud-logo{font-size:18px;font-weight:900;color:#D4A843;text-shadow:0 0 12px rgba(212,168,67,0.2)}
.hud-coins{
font-weight:800;font-size:15px;
background-color:rgba(212,168,67,0.08);
padding:5px 14px;border-radius:20px;
border:1px solid rgba(212,168,67,0.1);
}

/* STATS */
.row3{display:flex;gap:6px;margin-bottom:8px}
.box{
flex:1;text-align:center;padding:8px 4px;
background-color:rgba(14,18,36,0.65);
border-radius:14px;
border:1px solid rgba(255,255,255,0.03);
-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
}
.box-l{font-size:8px;color:#2e3454;text-transform:uppercase;letter-spacing:1.5px;font-weight:800}
.box-v{font-size:22px;font-weight:900;color:#D4A843;text-shadow:0 0 10px rgba(212,168,67,0.15)}

/* PROPERTY DOTS */
.dots{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
.dot{
width:40px;height:40px;border-radius:13px;
display:flex;align-items:center;justify-content:center;
font-size:18px;opacity:0.12;
transition:all 0.6s cubic-bezier(0.34,1.56,0.64,1);
border:2px solid transparent;
position:relative;
}
.dot.owned{
opacity:1;transform:scale(1.1);
border-color:rgba(255,255,255,0.12);
box-shadow:0 4px 16px rgba(0,0,0,0.4),0 0 12px rgba(0,0,0,0.2);
}
.dot.pop{animation:dotPop 0.7s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes dotPop{
0%{transform:scale(0.3) rotate(-30deg);opacity:0}
40%{transform:scale(1.5) rotate(10deg);opacity:1}
70%{transform:scale(0.9) rotate(-3deg)}
100%{transform:scale(1.1) rotate(0);opacity:1}
}

/* BOARD */
.bd{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}

/* LOCATION CARD */
.card{
width:100%;max-width:340px;
border-radius:24px;overflow:hidden;
animation:cardSlide 0.55s cubic-bezier(0.34,1.56,0.64,1);
box-shadow:0 16px 50px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.05);
position:relative;
}
@keyframes cardSlide{
from{opacity:0;transform:translateY(28px) scale(0.9) rotate(-2deg)}
to{opacity:1;transform:translateY(0) scale(1) rotate(0)}
}

.card-top{
height:100px;
display:flex;align-items:center;justify-content:center;
position:relative;overflow:hidden;
}
.card-top::before{
content:’’;position:absolute;top:0;left:0;right:0;bottom:0;
background:linear-gradient(180deg,rgba(255,255,255,0.14) 0%,transparent 50%,rgba(0,0,0,0.2) 100%);
}
.card-top::after{
content:’’;position:absolute;bottom:0;left:15%;right:15%;
height:1px;background-color:rgba(255,255,255,0.15);
}
.card-em{
position:relative;z-index:1;font-size:50px;
filter:drop-shadow(0 8px 16px rgba(0,0,0,0.35));
animation:emBob 4s ease-in-out infinite;
}
@keyframes emBob{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-8px) scale(1.04)}}

.card-b{background-color:#f4efe5;padding:18px 22px 22px;color:#0e1224}
.card-name{font-size:24px;font-weight:900;margin-bottom:5px;letter-spacing:0.2px}
.card-desc{font-size:13px;color:#6b7080;line-height:1.6;margin-bottom:14px}
.card-ft{
display:flex;justify-content:space-between;align-items:center;
padding-top:12px;border-top:2px solid rgba(0,0,0,0.05);
}
.card-pr{font-size:20px;font-weight:900;color:#1a8f4a}
.card-rn{font-size:11px;color:#a0a4b0;font-weight:700;letter-spacing:0.3px}
.card-own{
font-size:13px;font-weight:900;color:#2B4C7E;
background-color:rgba(43,76,126,0.08);
padding:7px 18px;border-radius:20px;
border:1px solid rgba(43,76,126,0.1);
}

/* PROGRESS */
.pb{width:100%;max-width:340px;height:5px;background-color:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden}
.pf{
height:100%;border-radius:3px;
background-color:#D4A843;
transition:width 0.7s cubic-bezier(0.34,1.56,0.64,1);
box-shadow:0 0 10px rgba(212,168,67,0.3);
}
.pl{font-size:8px;color:#252a44;text-align:center;letter-spacing:2px;text-transform:uppercase;font-weight:800;margin:3px 0 8px}

/* DICE */
.da{display:flex;flex-direction:column;align-items:center;gap:14px}

.dd{
width:88px;height:88px;
display:flex;align-items:center;justify-content:center;
font-size:50px;
background-color:rgba(14,18,36,0.6);
border-radius:22px;
border:1px solid rgba(255,255,255,0.05);
box-shadow:0 8px 30px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.04);
-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
}
.dd.spin{animation:dspin 0.06s linear infinite}
@keyframes dspin{0%{transform:rotate(0) scale(1)}50%{transform:rotate(180deg) scale(1.15)}100%{transform:rotate(360deg) scale(1)}}
.dd.land{animation:dland 0.5s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes dland{from{transform:scale(0.3) rotate(-200deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}

.rbtn{
display:block;
font-size:21px;font-weight:900;
padding:18px 68px;
border:none;border-radius:50px;
background-color:#1B2A4A;
color:#FFFFFF;
cursor:pointer;letter-spacing:2px;
-webkit-appearance:none;appearance:none;
box-shadow:0 0 30px rgba(27,42,74,0.4),0 8px 24px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.07);
position:relative;overflow:hidden;
animation:btnPulse 3s ease-in-out infinite;
}
@keyframes btnPulse{0%,100%{box-shadow:0 0 30px rgba(27,42,74,0.4),0 8px 24px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.07)}50%{box-shadow:0 0 45px rgba(27,42,74,0.6),0 8px 24px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.07)}}
.rbtn::after{
content:’’;position:absolute;top:0;left:-100%;width:50%;height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,0.05),transparent);
animation:gshine 5s ease-in-out infinite;
}
.rbtn:active{transform:scale(0.96);box-shadow:0 0 15px rgba(27,42,74,0.3),0 4px 12px rgba(0,0,0,0.3)}
.rbtn:disabled{opacity:0.25;animation:none}

/* =================== EVENTS =================== */
.ov{
position:fixed;top:0;left:0;right:0;bottom:0;z-index:50;
background-color:rgba(4,5,12,0.82);
-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
display:flex;align-items:center;justify-content:center;
padding:20px;animation:ovFade 0.2s ease-out;
}
@keyframes ovFade{from{opacity:0}to{opacity:1}}
.ov.hidden{display:none}

.ev{
background-color:#fff;border-radius:26px;
padding:30px 24px 26px;max-width:310px;width:100%;
color:#0e1224;text-align:center;
animation:evBounce 0.5s cubic-bezier(0.34,1.56,0.64,1);
box-shadow:0 30px 70px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.03);
position:relative;overflow:hidden;
}
.ev::before{
content:’’;position:absolute;top:0;left:0;right:0;height:4px;
background:linear-gradient(90deg,#D4A843,#2B4C7E,#1d9d51,#C0392B,#D4A843);
background-size:200% 100%;
animation:gradBar 3s linear infinite;
}
@keyframes gradBar{0%{background-position:0% 0}100%{background-position:200% 0}}
@keyframes evBounce{from{transform:scale(0.5) translateY(40px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}

.ev-em{font-size:56px;margin-bottom:14px;animation:evEmPop 0.6s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes evEmPop{from{transform:scale(0) rotate(-50deg)}to{transform:scale(1) rotate(0)}}
.ev-ti{font-size:22px;font-weight:900;margin-bottom:6px}
.ev-de{font-size:14px;color:#5a5e6e;line-height:1.65;margin-bottom:22px}
.ev-bt{display:flex;gap:10px;justify-content:center}

.eb{
font-size:15px;font-weight:800;
padding:13px 28px;border:none;border-radius:50px;
cursor:pointer;-webkit-appearance:none;appearance:none;
transition:transform 0.15s;
}
.eb:active{transform:scale(0.94)}
.eb-buy{background-color:#1d9d51;color:#fff;box-shadow:0 6px 20px rgba(29,157,81,0.2)}
.eb-pass{background-color:#eae6dc;color:#5a5e6e}
.eb-ok{background-color:#1B2A4A;color:#fff;box-shadow:0 6px 20px rgba(27,42,74,0.2)}

/* =================== WIN =================== */
#win{
position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;
background-color:#06080f;
display:none;flex-direction:column;align-items:center;justify-content:center;
padding:24px;text-align:center;overflow:hidden;
}
#win.active{display:flex}
.wg1{
position:absolute;width:300px;height:300px;border-radius:50%;
background-color:rgba(212,168,67,0.1);
top:15%;left:50%;transform:translateX(-50%);
filter:blur(80px);animation:wgPulse 4s ease-in-out infinite alternate;
}
.wg2{
position:absolute;width:200px;height:200px;border-radius:50%;
background-color:rgba(43,76,126,0.08);
bottom:20%;left:30%;
filter:blur(60px);animation:wgPulse 5s ease-in-out infinite alternate-reverse;
}
@keyframes wgPulse{0%{transform:translateX(-50%) scale(1)}100%{transform:translateX(-50%) scale(1.3)}}

.wz{position:relative;z-index:2}
.w-em{font-size:92px;margin-bottom:20px;animation:pawDance 2.5s cubic-bezier(0.36,0.07,0.19,0.97) infinite;filter:drop-shadow(0 0 30px rgba(212,168,67,0.25))}
.w-ti{font-size:40px;font-weight:900;color:#D4A843;margin-bottom:10px;text-shadow:0 0 40px rgba(212,168,67,0.25)}
.w-su{font-size:15px;color:#3a4060;margin-bottom:34px;line-height:1.7;max-width:290px}

/* =================== FX =================== */
.confetti{position:fixed;z-index:200;pointer-events:none;animation:cfall linear forwards}
@keyframes cfall{0%{transform:translateY(-20px) rotateZ(0) rotateX(0);opacity:1}100%{transform:translateY(110vh) rotateZ(720deg) rotateX(360deg);opacity:0}}

.fcoin{
position:fixed;font-size:17px;font-weight:900;
pointer-events:none;z-index:60;color:#D4A843;
text-shadow:0 0 12px rgba(212,168,67,0.4);
animation:fup 1.2s cubic-bezier(0.2,0.8,0.3,1) forwards;
}
@keyframes fup{0%{opacity:1;transform:translateY(0) scale(1.2)}100%{opacity:0;transform:translateY(-100px) scale(0.5)}}

.sflash{
position:fixed;top:0;left:0;right:0;bottom:0;
z-index:45;pointer-events:none;
animation:sf 0.5s ease-out forwards;
}
@keyframes sf{from{opacity:0.18}to{opacity:0}}

.shake{animation:shk 0.35s ease-out}
@keyframes shk{
0%,100%{transform:translateX(0)}
15%{transform:translateX(-6px) rotate(-0.5deg)}
30%{transform:translateX(5px) rotate(0.5deg)}
45%{transform:translateX(-4px)}
60%{transform:translateX(3px)}
75%{transform:translateX(-2px)}
}

/* SPARKLE ON BUY */
.sparkle{
position:fixed;pointer-events:none;z-index:55;
width:6px;height:6px;border-radius:50%;
animation:sparkAnim 0.8s ease-out forwards;
}
@keyframes sparkAnim{
0%{transform:translate(0,0) scale(1);opacity:1}
100%{transform:translate(var(–sx),var(–sy)) scale(0);opacity:0}
}
</style>

</head>
<body>

<canvas id="sky"></canvas>

<div class="aurora">
  <div class="aurora-band ab1"></div>
  <div class="aurora-band ab2"></div>
  <div class="aurora-band ab3"></div>
</div>

<div id="splash">
  <div class="sp-ring"></div><div class="sp-ring"></div><div class="sp-ring"></div>
  <div class="sp-z">
    <div class="sp-paw">🐾</div>
    <div class="sp-title">GOOBY</div>
    <div class="sp-line"></div>
    <div class="sp-sub">Uma aventura em Braga</div>
    <button class="gbtn" onclick="go()">Jogar! 🎲</button>
  </div>
</div>

<div id="game">
  <div class="hud">
    <div class="hud-logo">🐾 Gooby</div>
    <div class="hud-coins">💰 <span id="coins">500</span></div>
  </div>
  <div class="row3">
    <div class="box"><div class="box-l">Ronda</div><div class="box-v" id="rnd">1</div></div>
    <div class="box"><div class="box-l">Owned</div><div class="box-v" id="own">0/8</div></div>
    <div class="box"><div class="box-l">Steps</div><div class="box-v" id="stp">0</div></div>
  </div>
  <div class="dots" id="dots"></div>
  <div class="bd">
    <div class="card" id="card">
      <div class="card-top" id="cTop"><span class="card-em" id="cEm">⛪</span></div>
      <div class="card-b">
        <div class="card-name" id="cNm">Bom Jesus</div>
        <div class="card-desc" id="cDe">The famous sanctuary.</div>
        <div class="card-ft" id="cFt">
          <span class="card-pr">💰 120</span>
          <span class="card-rn">Rent: 25/turn</span>
        </div>
      </div>
    </div>
    <div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>
    <div class="pl">Braga Conquest</div>
    <div class="da">
      <div class="dd" id="dd">🎲</div>
      <button class="rbtn" id="rb" onclick="roll()">ROLL 🎲</button>
    </div>
  </div>
</div>

<div class="ov hidden" id="ov">
  <div class="ev">
    <div class="ev-em" id="eEm">🎉</div>
    <div class="ev-ti" id="eTi">Event</div>
    <div class="ev-de" id="eDe">Something happened.</div>
    <div class="ev-bt" id="eBt"></div>
  </div>
</div>

<div id="win">
  <div class="wg1"></div><div class="wg2"></div>
  <div class="wz">
    <div class="w-em">🏆</div>
    <div class="w-ti">Gooby did it!</div>
    <div class="w-su" id="wMsg">All of Braga belongs to Gooby.</div>
    <button class="gbtn" onclick="restart()">Play Again 🎲</button>
  </div>
</div>

<script>
/* ====== STARFIELD CANVAS ====== */
(function(){
  var c=document.getElementById('sky'),x=c.getContext('2d'),pts=[],W,H;
  function sz(){W=c.width=innerWidth;H=c.height=innerHeight;pts=[];
    for(var i=0,n=Math.min(80,Math.floor(W*H/10000));i<n;i++)
      pts.push({x:Math.random()*W,y:Math.random()*H,r:0.4+Math.random()*1.6,
        dx:(Math.random()-0.5)*0.2,dy:(Math.random()-0.5)*0.2,
        ph:Math.random()*6.28,sp:0.008+Math.random()*0.015});
  }
  function draw(){
    x.clearRect(0,0,W,H);
    for(var i=0;i<pts.length;i++){
      var p=pts[i];p.x+=p.dx;p.y+=p.dy;p.ph+=p.sp;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      var a=0.1+Math.sin(p.ph)*0.2;
      x.beginPath();x.arc(p.x,p.y,p.r,0,6.28);
      x.fillStyle='rgba(212,168,67,'+a+')';x.fill();
      // glow
      x.beginPath();x.arc(p.x,p.y,p.r*3,0,6.28);
      x.fillStyle='rgba(212,168,67,'+(a*0.08)+')';x.fill();
    }
    for(var i=0;i<pts.length;i++)
      for(var j=i+1;j<pts.length;j++){
        var dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<100){x.beginPath();x.moveTo(pts[i].x,pts[i].y);x.lineTo(pts[j].x,pts[j].y);
          x.strokeStyle='rgba(43,76,126,'+(0.05*(1-d/100))+')';x.lineWidth=0.6;x.stroke();}
      }
    requestAnimationFrame(draw);
  }
  sz();draw();addEventListener('resize',sz);
})();

/* ====== DATA ====== */
var L=[
  {n:"Bom Jesus",e:"⛪",c:"#2B4C7E",d:"The famous sanctuary with its baroque stairway. Gooby climbs all 577 steps!",p:120,r:25},
  {n:"Sé de Braga",e:"🏛️",c:"#7D3C98",d:"The oldest cathedral in Portugal. Gooby lights a candle.",p:150,r:30},
  {n:"Jardim de Santa Bárbara",e:"🌺",c:"#1E8449",d:"Beautiful medieval gardens. Gooby rolls in the flowers.",p:90,r:18},
  {n:"Arco da Porta Nova",e:"🏰",c:"#B8860B",d:"The grand 18th century arch. Gooby poses for a photo.",p:100,r:20},
  {n:"Mercado Municipal",e:"🐟",c:"#D35400",d:"Fresh fish, pastéis, and bacalhau! Gooby eats everything.",p:80,r:15},
  {n:"Theatro Circo",e:"🎭",c:"#922B21",d:"The historic theater. Gooby watches a fado show.",p:130,r:28},
  {n:"Estádio Municipal",e:"⚽",c:"#148F77",d:"Home of SC Braga. Gooby scores a goal!",p:160,r:35},
  {n:"Sameiro",e:"✨",c:"#1A5276",d:"The sanctuary on the hill with views forever. Gooby finds peace.",p:140,r:30}
];
var EV=[
  {e:"🍷",t:"Vinho Verde!",d:"A local offers Gooby vinho verde. Saúde! +60 coins.",c:60},
  {e:"🌧️",t:"Chuva em Braga!",d:"It rains (obviously). Umbrella tax. -40 coins.",c:-40},
  {e:"🐓",t:"Galo de Barcelos!",d:"Gooby finds the lucky rooster! +80 coins.",c:80},
  {e:"🍰",t:"Pastel de Nata!",d:"Free natas from a pastelaria. Life is good. +50 coins.",c:50},
  {e:"🚃",t:"Funicular Ride!",d:"Scenic ride up Bom Jesus. Worth it but pricey. -30 coins.",c:-30},
  {e:"💃",t:"São João!",d:"Festival time! Gooby dances in the streets. +70 coins.",c:70},
  {e:"🧹",t:"Lost Passport!",d:"Gooby drops the passport. Panic ensues. -50 coins.",c:-50},
  {e:"🎵",t:"Street Musician!",d:"Gooby tips a guitarra player. Boa sorte! -20 coins.",c:-20},
  {e:"🏆",t:"SC Braga Wins!",d:"Golaço! The whole city celebrates. +90 coins.",c:90},
  {e:"🌻",t:"Beautiful Day!",d:"Sun in Braga? A miracle. Gooby basks. +40 coins.",c:40}
];
var DF=['⚀','⚁','⚂','⚃','⚄','⚅'];
var $=0,P=0,R=1,S=0,O={},B=false;
function _$(s){return document.getElementById(s)}

/* ====== INIT ====== */
function go(){
  $=500;P=0;R=1;S=0;O={};
  _$('splash').classList.add('hidden');
  _$('game').classList.add('active');
  bDots();show();
}
function restart(){
  $=500;P=0;R=1;S=0;O={};
  _$('win').classList.remove('active');
  _$('game').classList.add('active');
  ui();bDots();show();
}

function bDots(){
  var s=_$('dots');s.innerHTML='';
  for(var i=0;i<L.length;i++){
    var d=document.createElement('div');
    d.className='dot'+(O[i]?' owned':'');
    d.style.backgroundColor=L[i].c;
    d.textContent=L[i].e;d.id='d'+i;
    s.appendChild(d);
  }
}

function ui(){
  _$('coins').textContent=$;
  _$('rnd').textContent=R;
  _$('own').textContent=Object.keys(O).length+'/8';
  _$('stp').textContent=S;
  _$('pf').style.width=(Object.keys(O).length/8*100)+'%';
}

function show(){
  var l=L[P],t=_$('cTop');
  t.style.backgroundColor=l.c;
  _$('cEm').textContent=l.e;
  _$('cNm').textContent=l.n;
  _$('cDe').textContent=l.d;
  var f=_$('cFt');
  if(O[P]) f.innerHTML='<span class="card-own">🐾 Gooby owns this!</span>';
  else f.innerHTML='<span class="card-pr">💰 '+l.p+'</span><span class="card-rn">Rent: '+l.r+'/turn</span>';
  var cd=_$('card');cd.style.animation='none';cd.offsetHeight;
  cd.style.animation='cardSlide 0.55s cubic-bezier(0.34,1.56,0.64,1)';
  ui();
}

/* ====== DICE ====== */
function roll(){
  if(B)return;B=true;
  _$('rb').disabled=true;
  var d=_$('dd');d.classList.add('spin');d.classList.remove('land');
  var t=0,iv=setInterval(function(){
    d.textContent=DF[Math.floor(Math.random()*6)];t++;
    if(t>=20){clearInterval(iv);
      var r=Math.floor(Math.random()*6)+1;
      d.textContent=DF[r-1];d.classList.remove('spin');d.classList.add('land');
      setTimeout(function(){mv(r)},400);
    }
  },55);
}

function mv(s){
  S+=s;var old=P;P=(P+s)%L.length;
  if(P<=old&&s>0){R++;$+=100;fc('+100');fl('#D4A843');}
  show();
  if(Math.random()<0.35)setTimeout(rE,500);
  else setTimeout(pE,500);
}

/* ====== PROPERTY EVENT ====== */
function pE(){
  var l=L[P];
  if(O[P]){
    $+=l.r;fc('+'+l.r);fl('#1d9d51');
    sE(l.e,l.n,'Gooby collects '+l.r+' coins rent!',[
      {t:'Nice! 🐾',c:'eb-ok',f:function(){hE();fin()}}
    ]);
  }else if($>=l.p){
    sE(l.e,'Buy '+l.n+'?','Costs '+l.p+' coins. Earns '+l.r+' each visit.',[
      {t:'Buy 💰'+l.p,c:'eb-buy',f:buy},
      {t:'Pass',c:'eb-pass',f:rent}
    ]);
  }else{
    sE('😅','Too Expensive!',"Can't afford "+l.n+'. Pays '+l.r+' rent.',[
      {t:'Okay 😔',c:'eb-ok',f:rent}
    ]);
  }
}

function buy(){
  var l=L[P];$-=l.p;O[P]=true;
  var d=_$('d'+P);
  if(d){d.classList.add('owned','pop');setTimeout(function(){d.classList.remove('pop')},800);}
  fl('#D4A843');sparkles();shake();
  hE();show();
  if(Object.keys(O).length>=8)setTimeout(winG,600);
  else fin();
}
function rent(){
  $-=L[P].r;if($<0)$=0;
  hE();ui();fin();
}

/* ====== RANDOM EVENT ====== */
function rE(){
  var v=EV[Math.floor(Math.random()*EV.length)];
  var tx=v.c>0?'+'+v.c:''+v.c;
  sE(v.e,v.t,v.d,[
    {t:tx+' coins',c:v.c>0?'eb-buy':'eb-pass',f:function(){
      $+=v.c;if($<0)$=0;
      if(v.c>0){fc('+'+v.c);fl('#1d9d51');}
      else{fl('#922B21');shake();}
      hE();ui();fin();
    }}
  ]);
}

/* ====== EVENT UI ====== */
function sE(em,ti,de,bs){
  _$('eEm').textContent=em;_$('eTi').textContent=ti;_$('eDe').textContent=de;
  var c=_$('eBt');c.innerHTML='';
  for(var i=0;i<bs.length;i++){
    var b=document.createElement('button');
    b.className='eb '+bs[i].c;b.textContent=bs[i].t;b.onclick=bs[i].f;
    c.appendChild(b);
  }
  _$('ov').classList.remove('hidden');
}
function hE(){_$('ov').classList.add('hidden')}
function fin(){B=false;_$('rb').disabled=false;ui()}

/* ====== WIN ====== */
function winG(){
  _$('game').classList.remove('active');
  _$('wMsg').textContent='Gooby conquered all of Braga in '+R+' rounds and '+S+' steps with '+$+' coins. Que aventura!';
  _$('win').classList.add('active');
  doCon();
}

/* ====== FX ====== */
function fc(t){
  var e=document.createElement('div');e.className='fcoin';
  e.textContent='💰 '+t;
  e.style.left=(innerWidth/2-28)+'px';e.style.top='52px';
  document.body.appendChild(e);setTimeout(function(){e.remove()},1300);
}
function fl(c){
  var f=document.createElement('div');f.className='sflash';
  f.style.backgroundColor=c;document.body.appendChild(f);
  setTimeout(function(){f.remove()},600);
}
function shake(){
  var g=_$('game');g.classList.remove('shake');g.offsetHeight;g.classList.add('shake');
}
function sparkles(){
  var cx=innerWidth/2,cy=innerHeight/2;
  for(var i=0;i<14;i++){
    var s=document.createElement('div');s.className='sparkle';
    var angle=Math.random()*6.28,dist=40+Math.random()*80;
    s.style.setProperty('--sx',Math.cos(angle)*dist+'px');
    s.style.setProperty('--sy',Math.sin(angle)*dist+'px');
    s.style.left=(cx-3)+'px';s.style.top=(cy-3)+'px';
    s.style.backgroundColor=['#D4A843','#fff','#2B4C7E','#1d9d51'][Math.floor(Math.random()*4)];
    document.body.appendChild(s);setTimeout(function(s){return function(){s.remove()}}(s),900);
  }
}
function doCon(){
  var cols=['#D4A843','#2B4C7E','#C0392B','#27AE60','#E67E22','#7D3C98','#fff','#1A5276'];
  for(var i=0;i<80;i++){(function(i){setTimeout(function(){
    var p=document.createElement('div');p.className='confetti';
    p.style.left=Math.random()*100+'vw';
    p.style.backgroundColor=cols[Math.floor(Math.random()*cols.length)];
    var sz=4+Math.random()*12;
    p.style.width=sz+'px';p.style.height=sz+'px';
    p.style.borderRadius=Math.random()>0.5?'50%':'2px';
    p.style.animationDuration=(1.5+Math.random()*3.5)+'s';
    document.body.appendChild(p);setTimeout(function(){p.remove()},6000);
  },i*35)})(i)}
}
</script>

</body>
</html>
