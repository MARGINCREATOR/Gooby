<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="author" content="Richard B. Price Jr.">
<title>Gooby's Braga Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
–braga-gold: #D4A843;
–braga-blue: #2B4C7E;
–braga-red: #C0392B;
–braga-green: #27AE60;
–tile-bg: #F5F0E8;
–board-bg: #1a1a2e;
–card-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

body {
font-family: ‘Nunito’, sans-serif;
background: var(–board-bg);
color: #fff;
min-height: 100dvh;
overflow-x: hidden;
position: relative;
}

/* SPLASH SCREEN */
#splash {
position: fixed; inset: 0; z-index: 100;
background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
display: flex; flex-direction: column;
align-items: center; justify-content: center;
animation: splashGlow 3s ease-in-out infinite alternate;
}
@keyframes splashGlow {
from { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
to { background: linear-gradient(135deg, #16213e 0%, #0f3460 50%, #1a1a4e 100%); }
}
#splash.hidden { display: none; }

.splash-gooby {
font-size: 80px;
animation: goobySplashBounce 1.5s ease-in-out infinite;
}
@keyframes goobySplashBounce {
0%, 100% { transform: translateY(0) rotate(-5deg); }
50% { transform: translateY(-20px) rotate(5deg); }
}

.splash-title {
font-family: ‘Fredoka One’, cursive;
font-size: 48px;
color: var(–braga-gold);
margin: 16px 0 4px;
text-shadow: 0 3px 10px rgba(212,168,67,0.4);
}
.splash-sub {
font-size: 16px;
color: rgba(255,255,255,0.6);
margin-bottom: 32px;
font-weight: 600;
}

.play-btn {
font-family: ‘Fredoka One’, cursive;
font-size: 22px;
padding: 14px 48px;
border: none; border-radius: 50px;
background: linear-gradient(135deg, var(–braga-gold), #e8c15a);
color: #1a1a2e;
cursor: pointer;
box-shadow: 0 6px 25px rgba(212,168,67,0.4);
transition: transform 0.2s, box-shadow 0.2s;
}
.play-btn:active { transform: scale(0.95); box-shadow: 0 3px 12px rgba(212,168,67,0.3); }

/* GAME SCREEN */
#game { display: none; flex-direction: column; min-height: 100dvh; padding: 12px; }
#game.active { display: flex; }

.top-bar {
display: flex; justify-content: space-between; align-items: center;
padding: 8px 12px;
background: rgba(255,255,255,0.06);
border-radius: 16px;
margin-bottom: 10px;
}
.top-bar .logo {
font-family: ‘Fredoka One’, cursive;
font-size: 20px; color: var(–braga-gold);
}
.top-bar .coins {
font-weight: 800; font-size: 16px;
display: flex; align-items: center; gap: 6px;
}

.stats-row {
display: flex; gap: 8px; margin-bottom: 10px;
}
.stat-card {
flex: 1;
background: rgba(255,255,255,0.06);
border-radius: 12px;
padding: 8px 10px;
text-align: center;
}
.stat-card .label { font-size: 10px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-card .value { font-family: ‘Fredoka One’, cursive; font-size: 20px; color: var(–braga-gold); }

/* BOARD */
.board-container {
flex: 1;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
position: relative;
}

.location-card {
width: 100%; max-width: 340px;
background: var(–tile-bg);
border-radius: 20px;
overflow: hidden;
box-shadow: var(–card-shadow);
color: #1a1a2e;
transition: transform 0.3s;
animation: cardEntry 0.4s ease-out;
}
@keyframes cardEntry {
from { opacity: 0; transform: scale(0.9) translateY(20px); }
to { opacity: 1; transform: scale(1) translateY(0); }
}

.location-banner {
height: 56px;
display: flex; align-items: center; justify-content: center;
font-size: 36px;
position: relative;
}
.location-banner::after {
content: ‘’;
position: absolute; bottom: 0; left: 20%; right: 20%;
height: 3px; border-radius: 2px;
background: rgba(255,255,255,0.3);
}

.location-body { padding: 16px 20px; }
.location-name {
font-family: ‘Fredoka One’, cursive;
font-size: 22px;
margin-bottom: 4px;
}
.location-desc {
font-size: 13px;
color: #555;
line-height: 1.4;
margin-bottom: 12px;
}
.location-price {
display: flex; justify-content: space-between; align-items: center;
}
.price-tag {
font-family: ‘Fredoka One’, cursive;
font-size: 18px;
color: var(–braga-green);
}
.rent-tag {
font-size: 12px; color: #888; font-weight: 700;
}
.owned-tag {
font-family: ‘Fredoka One’, cursive;
font-size: 14px;
color: var(–braga-blue);
background: rgba(43,76,126,0.1);
padding: 4px 12px; border-radius: 20px;
}

/* EVENT CARD */
.event-overlay {
position: fixed; inset: 0; z-index: 50;
background: rgba(0,0,0,0.7);
display: flex; align-items: center; justify-content: center;
padding: 20px;
animation: fadeIn 0.3s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.event-overlay.hidden { display: none; }

.event-card {
background: #fff;
border-radius: 20px;
padding: 24px;
max-width: 320px;
width: 100%;
color: #1a1a2e;
text-align: center;
animation: cardPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes cardPop {
from { transform: scale(0.7); opacity: 0; }
to { transform: scale(1); opacity: 1; }
}
.event-emoji { font-size: 48px; margin-bottom: 12px; }
.event-title {
font-family: ‘Fredoka One’, cursive;
font-size: 20px; margin-bottom: 8px;
}
.event-desc { font-size: 14px; color: #555; line-height: 1.5; margin-bottom: 16px; }
.event-btn {
font-family: ‘Fredoka One’, cursive;
font-size: 16px;
padding: 10px 32px;
border: none; border-radius: 50px;
cursor: pointer;
transition: transform 0.2s;
}
.event-btn:active { transform: scale(0.95); }
.btn-buy { background: var(–braga-green); color: #fff; }
.btn-pass { background: #ddd; color: #555; margin-left: 8px; }
.btn-ok { background: var(–braga-blue); color: #fff; }
.btn-row { display: flex; gap: 8px; justify-content: center; }

/* DICE */
.dice-area {
margin-top: 12px;
display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.dice-display {
font-size: 56px;
transition: transform 0.1s;
min-height: 70px;
display: flex; align-items: center; justify-content: center;
}
.dice-display.rolling {
animation: diceRoll 0.1s linear infinite;
}
@keyframes diceRoll {
0% { transform: rotate(0deg) scale(1); }
25% { transform: rotate(90deg) scale(1.1); }
50% { transform: rotate(180deg) scale(1); }
75% { transform: rotate(270deg) scale(1.1); }
100% { transform: rotate(360deg) scale(1); }
}

.roll-btn {
font-family: ‘Fredoka One’, cursive;
font-size: 20px;
padding: 14px 52px;
border: none; border-radius: 50px;
background: linear-gradient(135deg, var(–braga-red), #e74c3c);
color: #fff;
cursor: pointer;
box-shadow: 0 6px 20px rgba(192,57,43,0.4);
transition: transform 0.2s, box-shadow 0.2s;
}
.roll-btn:active { transform: scale(0.95); box-shadow: 0 3px 10px rgba(192,57,43,0.3); }
.roll-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* WIN SCREEN */
#win {
position: fixed; inset: 0; z-index: 100;
background: linear-gradient(135deg, #1a1a2e, #0f3460);
display: none; flex-direction: column;
align-items: center; justify-content: center;
padding: 24px; text-align: center;
}
#win.active { display: flex; }
.win-emoji { font-size: 80px; margin-bottom: 16px; animation: goobySplashBounce 1.5s ease-in-out infinite; }
.win-title {
font-family: ‘Fredoka One’, cursive;
font-size: 36px; color: var(–braga-gold);
margin-bottom: 8px;
}
.win-sub { font-size: 16px; color: rgba(255,255,255,0.7); margin-bottom: 24px; line-height: 1.5; }

/* PROPERTY TRACKER */
.properties-strip {
display: flex; gap: 6px; flex-wrap: wrap;
justify-content: center;
margin-bottom: 10px;
}
.prop-dot {
width: 32px; height: 32px;
border-radius: 10px;
display: flex; align-items: center; justify-content: center;
font-size: 16px;
opacity: 0.25;
transition: opacity 0.3s, transform 0.3s;
}
.prop-dot.owned { opacity: 1; transform: scale(1.1); }

/* GOOBY WALK */
.gooby-walker {
position: fixed;
bottom: 100px;
font-size: 32px;
transition: left 0.6s ease-in-out;
z-index: 10;
pointer-events: none;
}
</style>

</head>

  <div class="gooby-walker" id="goobyWalker">🐾</div>

<!-- EVENT OVERLAY -->

<div class="event-overlay hidden" id="eventOverlay">
  <div class="event-card">
    <div class="event-emoji" id="eventEmoji">🎉</div>
    <div class="event-title" id="eventTitle">Event!</div>
    <div class="event-desc" id="eventDesc">Something happened.</div>
    <div class="btn-row" id="eventBtns"></div>
  </div>
</div>

<!-- WIN -->

<div id="win">
  <div class="win-emoji">🏆</div>
  <div class="win-title">Gooby did it!</div>
  <div class="win-sub" id="winMsg">All of Braga belongs to Gooby now. What an adventure!</div>
  <button class="play-btn" onclick="restartGame()">Play Again 🎲</button>
</div>

<script>
// ---- GAME DATA ----
const LOCATIONS = [
  { name: "Bom Jesus", emoji: "⛪", color: "#2B4C7E", desc: "The famous sanctuary with its baroque stairway. Gooby climbs all 577 steps!", price: 120, rent: 25 },
  { name: "Sé de Braga", emoji: "🏛️", color: "#8E44AD", desc: "The oldest cathedral in Portugal. Gooby lights a candle.", price: 150, rent: 30 },
  { name: "Jardim de Santa Bárbara", emoji: "🌺", color: "#27AE60", desc: "Beautiful medieval gardens. Gooby rolls in the flowers.", price: 90, rent: 18 },
  { name: "Arco da Porta Nova", emoji: "🏰", color: "#D4A843", desc: "The grand 18th century arch. Gooby poses for a photo.", price: 100, rent: 20 },
  { name: "Mercado Municipal", emoji: "🐟", color: "#E67E22", desc: "Fresh fish, pastéis, and bacalhau! Gooby eats everything.", price: 80, rent: 15 },
  { name: "Theatro Circo", emoji: "🎭", color: "#C0392B", desc: "The historic theater. Gooby watches a fado show.", price: 130, rent: 28 },
  { name: "Estádio Municipal", emoji: "⚽", color: "#16A085", desc: "Home of SC Braga. Gooby scores a goal!", price: 160, rent: 35 },
  { name: "Sameiro", emoji: "✨", color: "#2C3E50", desc: "The sanctuary on the hill with views forever. Gooby finds peace.", price: 140, rent: 30 },
];

const EVENTS = [
  { emoji: "🍷", title: "Vinho Verde!", desc: "A local offers Gooby a glass of vinho verde. Cheers! +60 coins.", coins: 60 },
  { emoji: "🌧️", title: "Chuva em Braga!", desc: "It rains (obviously). Gooby needs an umbrella. -40 coins.", coins: -40 },
  { emoji: "🐓", title: "Galo de Barcelos!", desc: "Gooby finds the lucky rooster! +80 coins.", coins: 80 },
  { emoji: "🍰", title: "Pastel de Nata!", desc: "A pastelaria gives Gooby free natas. +50 coins.", coins: 50 },
  { emoji: "🚃", title: "Funicular Ride!", desc: "Gooby takes the funicular up Bom Jesus. Scenic but pricey. -30 coins.", coins: -30 },
  { emoji: "💃", title: "Festa de São João!", desc: "It's festival time! Gooby dances in the streets. +70 coins.", coins: 70 },
  { emoji: "🧹", title: "Lost Passport!", desc: "Gooby drops the passport. The search costs time and money. -50 coins.", coins: -50 },
  { emoji: "🎵", title: "Street Musician!", desc: "Gooby gives a coin to a guitarra player. Boa sorte! -20 coins.", coins: -20 },
  { emoji: "🏆", title: "SC Braga Wins!", desc: "Braga wins the match! Everyone celebrates. +90 coins.", coins: 90 },
  { emoji: "🌻", title: "Beautiful Day!", desc: "Sun in Braga? Rare! Gooby enjoys the warmth. +40 coins.", coins: 40 },
];

const DICE_FACES = ['⚀','⚁','⚂','⚃','⚄','⚅'];

// ---- STATE ----
let coins = 500;
let position = 0;
let round = 1;
let totalSteps = 0;
let owned = new Set();
let rolling = false;

// ---- INIT ----
function startGame() {
  document.getElementById('splash').classList.add('hidden');
  document.getElementById('game').classList.add('active');
  buildPropStrip();
  showLocation();
}

function restartGame() {
  coins = 500;
  position = 0;
  round = 1;
  totalSteps = 0;
  owned = new Set();
  document.getElementById('win').classList.remove('active');
  document.getElementById('game').classList.add('active');
  updateUI();
  buildPropStrip();
  showLocation();
}

function buildPropStrip() {
  const strip = document.getElementById('propStrip');
  strip.innerHTML = '';
  LOCATIONS.forEach((loc, i) => {
    const dot = document.createElement('div');
    dot.className = 'prop-dot' + (owned.has(i) ? ' owned' : '');
    dot.style.background = loc.color;
    dot.textContent = loc.emoji;
    dot.id = 'prop-' + i;
    strip.appendChild(dot);
  });
}

function updateUI() {
  document.getElementById('coins').textContent = coins;
  document.getElementById('round').textContent = round;
  document.getElementById('ownedCount').textContent = owned.size + '/8';
  document.getElementById('steps').textContent = totalSteps;
}

function showLocation() {
  const loc = LOCATIONS[position];
  document.getElementById('locBanner').style.background = loc.color;
  document.getElementById('locBanner').textContent = loc.emoji;
  document.getElementById('locName').textContent = loc.name;
  document.getElementById('locDesc').textContent = loc.desc;

  const priceArea = document.getElementById('locPriceArea');
  if (owned.has(position)) {
    priceArea.innerHTML = '<span class="owned-tag">🐾 Gooby owns this!</span>';
  } else {
    priceArea.innerHTML = `<span class="price-tag" id="locPrice">💰 ${loc.price}</span><span class="rent-tag">Rent: ${loc.rent}/turn</span>`;
  }

  // Re-trigger animation
  const card = document.getElementById('locationCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'cardEntry 0.4s ease-out';

  updateUI();
}

// ---- DICE ----
function rollDice() {
  if (rolling) return;
  rolling = true;
  const btn = document.getElementById('rollBtn');
  const display = document.getElementById('diceDisplay');
  btn.disabled = true;
  display.classList.add('rolling');

  let ticks = 0;
  const maxTicks = 15;
  const interval = setInterval(() => {
    display.textContent = DICE_FACES[Math.floor(Math.random() * 6)];
    ticks++;
    if (ticks >= maxTicks) {
      clearInterval(interval);
      const result = Math.floor(Math.random() * 6) + 1;
      display.textContent = DICE_FACES[result - 1];
      display.classList.remove('rolling');
      
      setTimeout(() => {
        moveGooby(result);
      }, 400);
    }
  }, 80);
}

function moveGooby(steps) {
  totalSteps += steps;
  const oldPos = position;
  position = (position + steps) % LOCATIONS.length;
  
  // Check if we passed start
  if (position < oldPos || (position === oldPos && steps > 0)) {
    round++;
    coins += 100; // Passing start bonus
  }

  showLocation();
  
  // 35% chance of random event, otherwise property event
  if (Math.random() < 0.35) {
    setTimeout(() => triggerRandomEvent(), 500);
  } else {
    setTimeout(() => triggerPropertyEvent(), 500);
  }
}

function triggerPropertyEvent() {
  const loc = LOCATIONS[position];
  const overlay = document.getElementById('eventOverlay');
  
  if (owned.has(position)) {
    // Collect rent from own property
    coins += loc.rent;
    showEvent(loc.emoji, loc.name, `Gooby collects ${loc.rent} coins rent from ${loc.name}!`, [
      { text: 'Nice! 🐾', class: 'btn-ok', action: () => { hideEvent(); finishTurn(); } }
    ]);
  } else {
    // Offer to buy
    if (coins >= loc.price) {
      showEvent(loc.emoji, 'Buy ' + loc.name + '?', `This property costs ${loc.price} coins. It earns ${loc.rent} coins each time Gooby visits!`, [
        { text: `Buy 💰${loc.price}`, class: 'btn-buy', action: () => { buyProperty(); } },
        { text: 'Pass', class: 'btn-pass', action: () => { payRent(); } }
      ]);
    } else {
      // Can't afford, pay rent
      showEvent('😅', 'Too Expensive!', `Gooby can't afford ${loc.name} (${loc.price} coins). Pays ${loc.rent} coins rent instead.`, [
        { text: 'Okay 😔', class: 'btn-ok', action: () => { payRentForced(); } }
      ]);
    }
  }
}

function buyProperty() {
  const loc = LOCATIONS[position];
  coins -= loc.price;
  owned.add(position);
  
  const dot = document.getElementById('prop-' + position);
  if (dot) dot.classList.add('owned');
  
  hideEvent();
  showLocation();
  
  if (owned.size >= 8) {
    setTimeout(winGame, 600);
  } else {
    finishTurn();
  }
}

function payRent() {
  const loc = LOCATIONS[position];
  coins -= loc.rent;
  if (coins < 0) coins = 0;
  hideEvent();
  updateUI();
  finishTurn();
}

function payRentForced() {
  payRent();
}

function triggerRandomEvent() {
  const event = EVENTS[Math.floor(Math.random() * EVENTS.length)];
  const coinText = event.coins > 0 ? `+${event.coins}` : `${event.coins}`;
  
  showEvent(event.emoji, event.title, event.desc, [
    { text: `${coinText} coins`, class: event.coins > 0 ? 'btn-buy' : 'btn-pass', action: () => {
      coins += event.coins;
      if (coins < 0) coins = 0;
      hideEvent();
      updateUI();
      finishTurn();
    }}
  ]);
}

function showEvent(emoji, title, desc, buttons) {
  document.getElementById('eventEmoji').textContent = emoji;
  document.getElementById('eventTitle').textContent = title;
  document.getElementById('eventDesc').textContent = desc;
  
  const btnContainer = document.getElementById('eventBtns');
  btnContainer.innerHTML = '';
  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'event-btn ' + b.class;
    btn.textContent = b.text;
    btn.onclick = b.action;
    btnContainer.appendChild(btn);
  });
  
  document.getElementById('eventOverlay').classList.remove('hidden');
}

function hideEvent() {
  document.getElementById('eventOverlay').classList.add('hidden');
}

function finishTurn() {
  rolling = false;
  document.getElementById('rollBtn').disabled = false;
  updateUI();
}

function winGame() {
  document.getElementById('game').classList.remove('active');
  const win = document.getElementById('win');
  document.getElementById('winMsg').textContent = 
    `Gooby explored all of Braga in ${round} rounds and ${totalSteps} steps, finishing with ${coins} coins. Que aventura!`;
  win.classList.add('active');
}
</script>

</body>
</html>
